name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like RedEye VB to do?
      description: Describe the feature and how you'd use it.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      description: What problem does this solve, or what makes the emulator better?
